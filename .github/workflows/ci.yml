name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.flags.outputs.docs_only }}
      docs_changed: ${{ steps.flags.outputs.docs_changed }}
      desktop_changed: ${{ steps.flags.outputs.desktop_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect docs scope
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            docs:
              - "README.md"
              - "docs/**"
              - "**/*.md"
            desktop:
              - ".github/workflows/ci.yml"
              - "package.json"
              - "pnpm-lock.yaml"
              - "electron-builder.yml"
              - "src/shell/desktop/**"
              - "src/shell/web/**"
              - "test/company-shell-desktop.test.ts"
            non_docs:
              - "**"
              - "!README.md"
              - "!docs/**"
              - "!**/*.md"

      - name: Compute scope flags
        id: flags
        shell: bash
        run: |
          if [[ "${{ steps.filter.outputs.docs }}" == "true" ]]; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.filter.outputs.desktop }}" == "true" ]]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.filter.outputs.docs }}" == "true" && "${{ steps.filter.outputs.non_docs }}" != "true" ]]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: [scope]
    if: needs.scope.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: "10.23.0"

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

  docs:
    needs: [scope]
    if: needs.scope.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: "10.23.0"

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check docs
        run: pnpm check:docs

      - name: Check docs links
        run: pnpm docs:linkcheck

      - name: Validate Mintlify docs
        run: pnpm docs:validate

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit detect-secrets==1.5.0

      - name: Detect secrets baseline
        run: detect-secrets scan --baseline .secrets.baseline

      - name: Detect private keys
        run: pre-commit run --all-files detect-private-key

      - name: Lint GitHub Actions workflows
        run: pre-commit run --all-files --hook-stage manual actionlint

      - name: Audit GitHub Actions workflows
        run: pre-commit run --all-files --hook-stage manual zizmor

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          checksums="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"

          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/${checksums}"
          grep " ${archive}$" "${checksums}" | sha256sum --check --strict

          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          tar -xzf "${archive}" -C "${RUNNER_TEMP}/gitleaks-bin" gitleaks
          echo "${RUNNER_TEMP}/gitleaks-bin" >> "${GITHUB_PATH}"

      - name: Run gitleaks
        run: gitleaks git --no-banner --redact .

  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Validate CI policy baseline
        run: node scripts/validate-ci-policy.mjs

  desktop-artifact:
    needs: [scope]
    if: needs.scope.outputs.docs_only != 'true' && needs.scope.outputs.desktop_changed == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: "10.23.0"

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS desktop artifact
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm build:desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "openboa-desktop-macos"
          path: "artifacts/desktop/*.zip"
          if-no-files-found: "error"

  required-ci:
    name: required-ci
    needs: [check, docs, secrets, gitleaks, policy, desktop-artifact]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate job results
        shell: bash
        run: |
          check_result="${{ needs.check.result }}"
          docs_result="${{ needs.docs.result }}"
          secrets_result="${{ needs.secrets.result }}"
          gitleaks_result="${{ needs.gitleaks.result }}"
          policy_result="${{ needs.policy.result }}"
          desktop_result="${{ needs.desktop-artifact.result }}"

          echo "check:    ${check_result}"
          echo "docs:     ${docs_result}"
          echo "secrets:  ${secrets_result}"
          echo "gitleaks: ${gitleaks_result}"
          echo "policy:   ${policy_result}"
          echo "desktop:  ${desktop_result}"

          failed=0
          if [[ "${check_result}" == "failure" || "${check_result}" == "cancelled" ]]; then
            failed=1
          fi
          if [[ "${docs_result}" == "failure" || "${docs_result}" == "cancelled" ]]; then
            failed=1
          fi
          if [[ "${secrets_result}" == "failure" || "${secrets_result}" == "cancelled" ]]; then
            failed=1
          fi
          if [[ "${gitleaks_result}" == "failure" || "${gitleaks_result}" == "cancelled" ]]; then
            failed=1
          fi
          if [[ "${policy_result}" == "failure" || "${policy_result}" == "cancelled" ]]; then
            failed=1
          fi
          if [[ "${desktop_result}" == "failure" || "${desktop_result}" == "cancelled" ]]; then
            failed=1
          fi

          if [[ "${failed}" -ne 0 ]]; then
            echo "required-ci failed"
            exit 1
          fi

          echo "required-ci passed"
