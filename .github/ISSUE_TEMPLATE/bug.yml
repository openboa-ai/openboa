name: Bug report
description: Report broken behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: How can we reproduce this?
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node version, OS, commit hash
    validations:
      required: true

